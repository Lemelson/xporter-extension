<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>XPorter — Feedback</title>
  <link rel="icon" type="image/png" href="assets/icon128.png" />
  <style>
    /* ============================================================
       XPorter feedback page — brand-matched glassmorphism.
       Theme tokens mirror the extension popup (popup.css).
       ============================================================ */
    :root {
      --bg-0: #0a1420;
      --bg-1: #0e1d2c;
      --text-primary: #FFFFFF;
      --text-secondary: rgba(255, 255, 255, 0.74);
      --text-muted: rgba(255, 255, 255, 0.55);
      --accent: #60B8FF;
      --accent-hover: #8DCFFF;
      --accent-glow: rgba(96, 184, 255, 0.20);
      --glass-bg: rgba(255, 255, 255, 0.06);
      --glass-bg-hover: rgba(255, 255, 255, 0.10);
      --glass-border: rgba(255, 255, 255, 0.20);
      --glass-border-strong: rgba(255, 255, 255, 0.34);
      --input-bg: rgba(255, 255, 255, 0.07);
      --card-shadow: 0 24px 70px rgba(4, 8, 20, 0.55), 0 2px 8px rgba(4, 8, 20, 0.35);
      --radius: 18px;
      --radius-sm: 12px;
      --ok: #3fb950;
    }

    body.light {
      --bg-0: #eaf1f8;
      --bg-1: #f7f9fb;
      --text-primary: rgba(0, 0, 0, 0.90);
      --text-secondary: rgba(0, 0, 0, 0.66);
      --text-muted: rgba(0, 0, 0, 0.50);
      --accent: #0A6FDB;
      --accent-hover: #0860C0;
      --accent-glow: rgba(10, 111, 219, 0.18);
      --glass-bg: rgba(255, 255, 255, 0.55);
      --glass-bg-hover: rgba(255, 255, 255, 0.78);
      --glass-border: rgba(0, 0, 0, 0.12);
      --glass-border-strong: rgba(0, 0, 0, 0.22);
      --input-bg: rgba(255, 255, 255, 0.70);
      --card-shadow: 0 24px 70px rgba(30, 41, 89, 0.18), 0 2px 8px rgba(30, 41, 89, 0.10);
      background:
        radial-gradient(ellipse at 20% 20%, rgba(59, 130, 246, 0.22) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(147, 51, 234, 0.18) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(14, 165, 233, 0.14) 0%, transparent 70%),
        linear-gradient(135deg, #adc6e8 0%, #c3b2dc 50%, #aacfe9 100%) !important;
      background-attachment: fixed;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', 'Noto Sans', Helvetica, Arial, sans-serif;
      color: var(--text-primary);
      background:
        radial-gradient(ellipse at 20% 20%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(168, 85, 247, 0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(14, 165, 233, 0.08) 0%, transparent 70%),
        linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 18px 56px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }

    /* top bar */
    .topbar {
      width: 100%;
      max-width: 560px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      font-weight: 700;
      font-size: 17px;
      letter-spacing: -0.2px;
      color: var(--text-primary);
    }
    .logo .bolt {
      display: inline-flex; color: #ffd60a;
      --zap-glow: 9px; --zap-glow-hi: 15px;
      --zap-c1: rgba(255, 200, 36, 0.72); --zap-c2: rgba(255, 222, 92, 1);
      --zap-extra: drop-shadow(0 0 0 transparent);
      filter: drop-shadow(0 0 var(--zap-glow) var(--zap-c1)) var(--zap-extra);
      animation: zap-glow 5s ease-in-out infinite, zap-flicker 7s linear infinite;
    }
    .logo .bolt svg { fill: currentColor; stroke: none; }
    body.light .logo .bolt {
      --zap-glow: 13px; --zap-glow-hi: 21px;
      --zap-c1: rgba(255, 184, 24, 0.7); --zap-c2: rgba(255, 204, 48, 0.95);
      --zap-extra: drop-shadow(0 0 4px rgba(72, 46, 132, 0.42)) drop-shadow(0 2px 10px rgba(99, 70, 229, 0.3));
    }
    @keyframes zap-glow {
      0%, 100% { filter: drop-shadow(0 0 var(--zap-glow) var(--zap-c1)) var(--zap-extra); }
      50% { filter: drop-shadow(0 0 var(--zap-glow-hi) var(--zap-c2)) var(--zap-extra); }
    }
    @keyframes zap-flicker {
      0%, 37%, 100% { opacity: 1; }
      37.6% { opacity: .45; } 38.2% { opacity: 1; } 38.9% { opacity: .65; } 39.5% { opacity: 1; }
      71% { opacity: 1; } 71.5% { opacity: .5; } 72% { opacity: 1; }
    }
    @media (prefers-reduced-motion: reduce) { .logo .bolt { animation: none; } }

    /* theme toggle */
    .tb-tools { display: inline-flex; align-items: center; gap: 9px; }
    .theme-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: 999px; cursor: pointer;
      background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-secondary);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); transition: color .15s, border-color .15s, transform .08s;
    }
    .theme-btn:hover { color: var(--text-primary); border-color: var(--glass-border-strong); }
    .theme-btn:active { transform: scale(.94); }
    .theme-btn .sun, .theme-btn .moon { display: none; }
    body:not(.light) .theme-btn .moon { display: block; }
    body.light .theme-btn .sun { display: block; }
    .confetti-replay {
      display: inline-flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: 999px; cursor: pointer;
      color: var(--text-secondary); background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .04), 0 0 0 rgba(85, 202, 255, 0);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      transition: color .2s ease, border-color .2s ease, background .2s ease,
        box-shadow .2s ease, transform .12s ease;
    }
    .confetti-replay[hidden] { display: none; }
    .confetti-replay:hover {
      color: var(--text-primary); border-color: rgba(112, 211, 255, .68);
      background: rgba(66, 200, 255, .10);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .08), 0 0 18px rgba(85, 202, 255, .17);
      transform: translateY(-1px);
    }
    .confetti-replay:active { transform: translateY(0) scale(.93); }
    .confetti-replay:focus-visible { outline: 3px solid var(--accent-glow); outline-offset: 3px; }
    .confetti-replay svg { width: 18px; height: 18px; overflow: visible; }
    .confetti-replay .spark-cyan { color: #55caff; }
    .confetti-replay .spark-gold { color: #ffd15c; }
    .confetti-replay .spark-mint { color: #55e5a7; }
    .confetti-replay.is-replaying svg {
      animation: replay-spark .52s cubic-bezier(.16,.82,.24,1);
    }
    @keyframes replay-spark {
      0% { transform: scale(.78) rotate(-12deg); }
      48% { transform: scale(1.18) rotate(8deg); }
      100% { transform: scale(1) rotate(0); }
    }
    .lang-selector { position: relative; z-index: 20; }
    .lang-btn {
      min-width: 122px;
      height: 36px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      border: 1px solid var(--glass-border);
      border-radius: 999px;
      color: var(--text-secondary);
      background: var(--glass-bg);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .04);
      backdrop-filter: blur(12px) saturate(140%);
      -webkit-backdrop-filter: blur(12px) saturate(140%);
      font: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: color .2s ease, border-color .2s ease, background .2s ease, box-shadow .2s ease, transform .08s ease;
    }
    .lang-btn:hover {
      color: var(--text-primary);
      border-color: var(--glass-border-strong);
      background: var(--glass-bg-hover);
    }
    .lang-btn:active { transform: scale(.98); }
    .lang-btn[aria-expanded="true"] {
      color: var(--text-primary);
      border-color: rgba(96, 184, 255, .72);
      background: rgba(96, 184, 255, .12);
      box-shadow: 0 0 0 3px rgba(96, 184, 255, .12), inset 0 1px 0 rgba(255, 255, 255, .08);
    }
    .lang-current-flag { flex: 0 0 auto; font-size: 15px; line-height: 1; }
    .lang-current-name {
      min-width: 0;
      flex: 1;
      overflow: hidden;
      text-align: start;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .lang-chevron {
      flex: 0 0 auto;
      opacity: .62;
      transition: transform .22s cubic-bezier(.2, .8, .2, 1), opacity .2s ease;
    }
    .lang-btn[aria-expanded="true"] .lang-chevron { transform: rotate(180deg); opacity: 1; }
    .lang-menu {
      position: absolute;
      top: calc(100% + 8px);
      inset-inline-end: 0;
      width: 224px;
      max-width: calc(100vw - 36px);
      max-height: 316px;
      padding: 6px;
      overflow-x: hidden;
      overflow-y: auto;
      border: 1px solid rgba(255, 255, 255, .20);
      border-radius: 14px;
      color: var(--text-primary);
      background: rgba(20, 34, 55, .94);
      box-shadow: 0 20px 50px rgba(2, 8, 23, .48), 0 4px 14px rgba(2, 8, 23, .34), inset 0 1px 0 rgba(255, 255, 255, .07);
      backdrop-filter: blur(24px) saturate(155%);
      -webkit-backdrop-filter: blur(24px) saturate(155%);
      transform-origin: top right;
      animation: lang-menu-in .18s cubic-bezier(.2, .8, .2, 1) both;
    }
    html[dir="rtl"] .lang-menu { transform-origin: top left; }
    .lang-menu[hidden] { display: none; }
    .lang-menu::-webkit-scrollbar { width: 5px; }
    .lang-menu::-webkit-scrollbar-track { background: transparent; }
    .lang-menu::-webkit-scrollbar-thumb { background: rgba(154, 185, 216, .30); border-radius: 999px; }
    .lang-menu::-webkit-scrollbar-thumb:hover { background: rgba(154, 185, 216, .52); }
    @keyframes lang-menu-in {
      from { opacity: 0; transform: translateY(-5px) scale(.975); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .lang-option {
      width: 100%;
      min-height: 40px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 10px;
      border: 0;
      border-radius: 9px;
      color: var(--text-secondary);
      background: transparent;
      font: inherit;
      font-size: 13px;
      cursor: pointer;
      transition: color .15s ease, background .15s ease, box-shadow .15s ease;
    }
    .lang-option:hover { color: var(--text-primary); background: rgba(96, 184, 255, .11); }
    .lang-option[aria-selected="true"] {
      color: #b8e0ff;
      background: rgba(96, 184, 255, .19);
      box-shadow: inset 3px 0 0 var(--accent), inset 0 0 0 1px rgba(96, 184, 255, .26);
      font-weight: 650;
    }
    html[dir="rtl"] .lang-option[aria-selected="true"] { box-shadow: inset -3px 0 0 var(--accent), inset 0 0 0 1px rgba(96, 184, 255, .26); }
    .lang-option-flag { flex: 0 0 auto; font-size: 17px; line-height: 1; }
    .lang-option-name { min-width: 0; flex: 1; text-align: start; }
    .lang-option-check { flex: 0 0 auto; color: var(--accent-hover); opacity: 0; }
    .lang-option[aria-selected="true"] .lang-option-check { opacity: 1; }
    .lang-btn:focus-visible, .lang-option:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    body.light .lang-btn[aria-expanded="true"] {
      border-color: rgba(10, 111, 219, .58);
      background: rgba(10, 111, 219, .10);
      box-shadow: 0 0 0 3px rgba(10, 111, 219, .10), inset 0 1px 0 rgba(255, 255, 255, .65);
    }
    body.light .lang-menu {
      border-color: rgba(16, 46, 84, .16);
      background: rgba(244, 249, 255, .94);
      box-shadow: 0 20px 50px rgba(31, 52, 89, .22), 0 4px 12px rgba(31, 52, 89, .12), inset 0 1px 0 rgba(255, 255, 255, .9);
    }
    body.light .lang-option:hover { background: rgba(10, 111, 219, .09); }
    body.light .lang-option[aria-selected="true"] { color: #075aaa; background: rgba(10, 111, 219, .14); }

    /* card */
    .card {
      position: relative;
      isolation: isolate;
      overflow: hidden;
      width: 100%;
      max-width: 560px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      box-shadow: var(--card-shadow);
      backdrop-filter: blur(22px) saturate(140%);
      -webkit-backdrop-filter: blur(22px) saturate(140%);
      padding: 30px 28px;
      animation: rise .5s cubic-bezier(.2, .8, .2, 1) both;
    }
    .card > * { position: relative; z-index: 1; }
    .card::before {
      content: ""; position: absolute; z-index: 0; inset: 0; pointer-events: none;
      opacity: 0;
      background:
        radial-gradient(ellipse 112% 96% at 50% 0%, rgba(70, 220, 170, .13), transparent 78%),
        radial-gradient(ellipse 130% 116% at 50% 14%, rgba(72, 197, 255, .12), transparent 82%);
      transition: opacity .5s cubic-bezier(.2,.7,.2,1);
    }
    .card::after {
      content: ""; position: absolute; z-index: 0; inset: 0; pointer-events: none;
      opacity: 0;
      background: linear-gradient(115deg, transparent 26%, rgba(255,255,255,.05) 49%, transparent 72%);
      transform: translate3d(-105%, 0, 0);
    }
    .card.success-mode::before { opacity: 1; }
    .card.success-mode::after { animation: success-card-sheen 1.2s .18s cubic-bezier(.2,.7,.2,1) both; }
    body.light .card::before {
      background:
        radial-gradient(ellipse 112% 96% at 50% 0%, rgba(30, 184, 128, .1), transparent 78%),
        radial-gradient(ellipse 130% 116% at 50% 14%, rgba(10, 111, 219, .1), transparent 82%);
    }
    @keyframes rise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

    h1 {
      font-size: 23px;
      font-weight: 700;
      letter-spacing: -0.4px;
      margin-bottom: 8px;
    }
    .subtitle {
      color: var(--text-secondary);
      font-size: 14.5px;
      margin-bottom: 22px;
    }
    .subtitle strong { color: var(--text-primary); font-weight: 650; }
    .q {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 12px;
    }

    /* reason chips */
    .reasons { display: flex; flex-direction: column; gap: 0; }
    .reason {
      display: flex; align-items: center; gap: 14px; width: 100%; text-align: start;
      background: var(--input-bg); border: 1px solid var(--glass-border); color: var(--text-primary);
      font: inherit; font-size: 15px; padding: 14px 16px; border-radius: var(--radius-sm); cursor: pointer;
      margin-bottom: 10px;
      transition: transform .18s cubic-bezier(.2,.8,.2,1), box-shadow .2s, background .2s, border-color .2s;
    }
    .reason:last-child { margin-bottom: 0; }
    .reason:hover { background: var(--glass-bg-hover); border-color: var(--glass-border-strong); transform: translateX(3px); }
    .reason:active { transform: scale(.99); }
    .reason.selected {
      border-color: var(--accent);
      background: linear-gradient(100deg, var(--accent-glow), transparent 85%);
      box-shadow: 0 10px 28px var(--accent-glow), inset 0 0 0 1px var(--accent);
      transform: translateY(-2px) scale(1.025);
      font-weight: 650;
    }
    .reason-icon {
      position: relative;
      width: 38px;
      height: 38px;
      flex: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      transition: filter .2s, transform .2s;
    }
    .reason-icon::before {
      content: "";
      position: relative;
      z-index: 1;
      width: 32px;
      height: 32px;
      background: var(--reason-color);
      -webkit-mask-image: var(--reason-icon);
      mask-image: var(--reason-icon);
      -webkit-mask-position: center;
      mask-position: center;
      -webkit-mask-repeat: no-repeat;
      mask-repeat: no-repeat;
      -webkit-mask-size: contain;
      mask-size: contain;
    }
    .reason-icon::after {
      content: "";
      position: absolute;
      z-index: 0;
      inset: 2px;
      border-radius: 50%;
      background: radial-gradient(circle, color-mix(in srgb, var(--reason-color) 34%, transparent) 0%, transparent 72%);
      filter: blur(6px);
      opacity: 0;
      transform: scale(.72);
      transition: opacity .22s, transform .22s;
      pointer-events: none;
    }
    .reason:hover .reason-icon {
      filter: brightness(1.12) saturate(1.12) drop-shadow(0 0 5px var(--reason-glow));
    }
    .reason.selected .reason-icon {
      filter: brightness(1.22) saturate(1.16) drop-shadow(0 0 6px var(--reason-glow));
      transform: scale(1.08);
    }
    .reason.selected .reason-icon::after { opacity: .92; transform: scale(1.42); }
    .reason[data-reason="r_once"] {
      --reason-color: #38c7ff; --reason-glow: rgba(56, 199, 255, .55);
      --reason-icon: url("assets/icons/reasons/number-circle-one-duotone.svg");
    }
    .reason[data-reason="r_broken"] {
      --reason-color: #ff625c; --reason-glow: rgba(255, 98, 92, .52);
      --reason-icon: url("assets/icons/reasons/wrench-duotone.svg");
    }
    .reason[data-reason="r_confusing"] {
      --reason-color: #ffc52f; --reason-glow: rgba(255, 197, 47, .50);
      --reason-icon: url("assets/icons/reasons/seal-question-duotone.svg");
    }
    .reason[data-reason="r_alt"] {
      --reason-color: #ae8cff; --reason-glow: rgba(174, 140, 255, .52);
      --reason-icon: url("assets/icons/reasons/arrows-left-right-duotone.svg");
    }
    .reason[data-reason="r_missing"] {
      --reason-color: #44e298; --reason-glow: rgba(68, 226, 152, .48);
      --reason-icon: url("assets/icons/reasons/puzzle-piece-duotone.svg");
    }
    .reason[data-reason="r_slow"] {
      --reason-color: #ff913d; --reason-glow: rgba(255, 145, 61, .50);
      --reason-icon: url("assets/icons/reasons/speedometer-duotone.svg");
    }
    .reason[data-reason="r_privacy"] {
      --reason-color: #668fff; --reason-glow: rgba(102, 143, 255, .52);
      --reason-icon: url("assets/icons/reasons/lock-key-duotone.svg");
    }
    .reason[data-reason="r_other"] {
      --reason-color: #ee7cff; --reason-glow: rgba(238, 124, 255, .50);
      --reason-icon: url("assets/icons/reasons/chat-circle-dots-duotone.svg");
    }
    .reason .check { margin-inline-start: auto; color: var(--accent); display: none; flex: none; }
    .reason.selected .check { display: inline-flex; }

    /* During a reason switch, the old and new locations exchange explicitly
       measured height on the same timeline. Overflow clipping therefore
       always matches the real space occupied in the list. */
    .action {
      display: none;
      margin: 6px 0 -2px;
      opacity: 1;
    }
    .action:last-child { margin-bottom: -12px; }
    .action.show { display: block; }
    .action.is-transitioning { overflow: hidden; pointer-events: none; }
    .action-transition-ghost { overflow: hidden; pointer-events: none; user-select: none; }
    /* Keep the CTA's 20px outer glow inside the animated clipping area.
       Negative outer margins compensate this gutter, preserving layout. */
    .action-inner { min-height: 0; padding-bottom: 20px; }
    .subreason-block { margin: 2px 0 18px; }
    .subreason-block[hidden] { display: none; }
    .subreason-heading {
      display: flex; align-items: baseline; justify-content: space-between; gap: 12px;
      color: var(--text-secondary); font-size: 13px; font-weight: 650; margin-bottom: 10px;
    }
    .subreason-hint { color: var(--text-muted); font-size: 11.5px; font-weight: 500; white-space: nowrap; }
    .subreason-options { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
    .subreason {
      appearance: none; width: 100%; min-height: 42px;
      display: grid; grid-template-columns: 32px minmax(0, 1fr) 17px; align-items: center; gap: 10px;
      border: 1px solid var(--glass-border); border-radius: 10px;
      background: var(--input-bg); color: var(--text-secondary); text-align: start;
      font: inherit; font-size: 12.5px; line-height: 1.3; padding: 9px 11px; cursor: pointer;
      transition: border-color .16s, background .16s, color .16s, box-shadow .16s, transform .16s;
    }
    .subreason[data-group="r_once"] { --mini-color: #38c7ff; }
    .subreason[data-group="r_broken"] { --mini-color: #ff625c; }
    .subreason[data-group="r_confusing"] { --mini-color: #ffc52f; }
    .subreason[data-group="r_alt"] { --mini-color: #ae8cff; }
    .subreason[data-group="r_missing"] { --mini-color: #44e298; }
    .subreason[data-group="r_slow"] { --mini-color: #ff913d; }
    .subreason[data-group="r_privacy"] { --mini-color: #668fff; }
    .subreason[data-group="r_other"] { --mini-color: #ee7cff; }
    .subreason-icon {
      position: relative;
      width: 32px; height: 32px; display: grid; place-items: center;
      color: var(--mini-color, var(--accent));
      opacity: 1;
      transform-origin: center;
      will-change: transform;
      transition: filter .24s cubic-bezier(.2,.8,.2,1), transform .24s cubic-bezier(.2,.8,.2,1);
    }
    .subreason-icon::after {
      content: "";
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      background: radial-gradient(circle, color-mix(in srgb, var(--mini-color, var(--accent)) 36%, transparent) 0%, transparent 72%);
      filter: blur(5px);
      opacity: 0;
      transform: scale(.7);
      transition: opacity .16s, transform .16s;
      pointer-events: none;
    }
    .subreason-icon svg {
      position: relative; z-index: 1;
      width: 23px; height: 23px;
      stroke-width: 2.1;
      filter: brightness(1.12) saturate(1.12) drop-shadow(0 0 2px color-mix(in srgb, var(--mini-color, var(--accent)) 48%, transparent));
    }
    .subreason-label {
      min-width: 0;
      text-wrap: pretty;
      transition: color .22s ease, text-shadow .24s ease;
    }
    .subreason-check {
      width: 16px; height: 16px; box-sizing: border-box; display: grid; place-items: center;
      border: 1px solid var(--glass-border-strong); border-radius: 5px; color: transparent;
      transition: color .16s, border-color .16s, background .16s, box-shadow .16s;
    }
    .subreason-check svg { width: 11px; height: 11px; }
    .subreason:hover .subreason-icon {
      filter: brightness(1.1) saturate(1.08);
      transform: scale(1.05);
    }
    .subreason:hover { border-color: var(--glass-border-strong); color: var(--text-primary); transform: translateY(-1px); }
    .subreason[aria-pressed="true"] {
      color: var(--text-primary); border-color: var(--accent);
      background: linear-gradient(110deg, var(--accent-glow), var(--input-bg) 70%);
      box-shadow: inset 0 0 0 1px var(--accent-glow), 0 4px 14px var(--accent-glow);
    }
    .subreason[aria-pressed="true"] .subreason-icon {
      filter: brightness(1.22) saturate(1.18);
      transform: scale(1.16);
    }
    .subreason[aria-pressed="true"] .subreason-icon::after { opacity: .9; transform: scale(1.45); }
    .subreason[aria-pressed="true"] .subreason-label {
      color: var(--text-primary);
      text-shadow: .32px 0 currentColor, -.32px 0 currentColor;
    }
    .subreason[aria-pressed="true"] .subreason-check {
      color: #fff; border-color: var(--accent); background: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .action-row { display: grid; gap: 12px; }
    .detail-stack { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 8px; }
    .detail-question {
      color: var(--text-secondary); font-size: 13px; font-weight: 600;
      line-height: 1.45; padding-inline: 2px; text-wrap: pretty;
    }
    textarea {
      width: 100%; min-width: 0; min-height: 100px; resize: vertical;
      background: var(--input-bg); border: 1px solid var(--glass-border); border-radius: var(--radius-sm);
      color: var(--text-primary); font: inherit; font-size: 14.5px; padding: 11px 14px;
      transition: border-color .15s, box-shadow .15s;
    }
    textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    textarea::placeholder { color: var(--text-muted); }
    .contact-consent { color: var(--text-muted); font-size: 11.5px; line-height: 1.45; padding-inline: 2px; }
    .contact-consent strong { color: var(--text-secondary); font-weight: 650; }

    /* Final CTA: organic ocean landscape with a continuous flowing outline. */
    @property --cta-angle {
      syntax: "<angle>";
      initial-value: 0deg;
      inherits: false;
    }
    .btn-send {
      --cta-edge: #55caff; --cta-edge-2: #d5f5ff;
      --cta-border: rgba(117,202,244,.35);
      --cta-glow: rgba(39,145,218,.15); --cta-glow-strong: rgba(72,189,255,.34);
      --cta-ring-dim: rgba(85,202,255,.14);
      --cta-blob-light: rgba(77,181,232,.68); --cta-blob-dark: rgba(2,17,43,.82);
      position: relative; isolation: isolate; overflow: hidden;
      width: 100%; min-height: 50px; justify-self: stretch;
      font: inherit; font-size: 14px; font-weight: 750; letter-spacing: -.1px;
      cursor: pointer; color: #fff; border: 1px solid var(--cta-border);
      border-radius: 11px; padding: 0 20px;
      display: inline-flex; align-items: center; justify-content: center; gap: 9px;
      background: linear-gradient(132deg, #071b33 0%, #0a3c63 48%, #092b4d 100%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.11), inset 0 -1px 0 rgba(255,255,255,.03), 0 8px 20px var(--cta-glow);
      transition: transform .2s cubic-bezier(.2,.8,.2,1), filter .2s, box-shadow .2s;
    }
    .btn-send > * { position: relative; z-index: 1; }
    .btn-send .send-icon {
      width: 18px; height: 18px; flex: none; color: var(--cta-edge-2);
      filter: drop-shadow(0 0 5px var(--cta-edge));
    }
    .btn-send .cta-blob {
      position: absolute; z-index: 0; display: block; pointer-events: none;
      opacity: 0; filter: blur(11px); will-change: transform;
    }
    .btn-send .cta-blob-light {
      width: 68%; height: 230%; left: -22%; top: -66%; opacity: .72;
      border-radius: 42% 58% 67% 33% / 57% 35% 65% 43%;
      background: var(--cta-blob-light);
      animation: cta-blob-a 24s cubic-bezier(.45,.05,.25,1) infinite;
    }
    .btn-send .cta-blob-dark {
      width: 72%; height: 215%; right: -25%; top: -58%; opacity: .78;
      border-radius: 64% 36% 44% 56% / 38% 61% 39% 62%;
      background: var(--cta-blob-dark);
      animation: cta-blob-b 31s cubic-bezier(.38,.08,.22,1) -8s infinite;
    }
    .btn-send::after {
      content: ""; position: absolute; z-index: 2; inset: 0; padding: 1.2px;
      border-radius: inherit; pointer-events: none; opacity: .8;
      background: conic-gradient(from var(--cta-angle),
        var(--cta-ring-dim) 0 60%, var(--cta-edge) 72%, var(--cta-edge-2) 78%,
        var(--cta-edge) 84%, var(--cta-ring-dim) 96% 100%);
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      filter: drop-shadow(0 0 3px var(--cta-edge));
      animation: cta-orbit 5.2s linear infinite;
    }
    .btn-send:hover {
      transform: translateY(-1px); filter: saturate(1.08) brightness(1.06);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.14), 0 10px 24px var(--cta-glow-strong);
    }
    .btn-send:active { transform: translateY(0) scale(.99); }
    .btn-send:focus-visible { outline: 3px solid var(--cta-glow-strong); outline-offset: 3px; }
    .btn-send:disabled { cursor: progress; transform: none; }
    .btn-send:disabled:not(.is-sending) { opacity: .62; }
    .btn-send:disabled:not(.is-sending)::after,
    .btn-send:disabled:not(.is-sending) .cta-blob { animation: none; }
    .btn-send.is-sending {
      filter: saturate(1.22) brightness(1.09);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.18),
        0 0 0 1px rgba(91,208,255,.2),
        0 10px 30px rgba(45,171,239,.4);
      animation: sending-breathe 1.2s ease-in-out infinite;
    }
    .btn-send.is-sending::after {
      opacity: 1;
      filter: drop-shadow(0 0 6px var(--cta-edge));
      animation: cta-orbit .78s linear infinite;
    }
    .btn-send.is-sending .cta-blob-light {
      opacity: .92;
      animation: cta-blob-a 2.4s cubic-bezier(.45,.05,.25,1) infinite;
    }
    .btn-send.is-sending .cta-blob-dark {
      opacity: .8;
      animation: cta-blob-b 2.9s cubic-bezier(.38,.08,.22,1) infinite;
    }
    .btn-send.is-sending .send-icon { animation: sending-plane 1.1s ease-in-out infinite; }

    @keyframes cta-blob-a {
      0%,100% { transform: translate3d(-12%, -8%, 0) scale(.92, 1.08) rotate(-7deg); }
      19% { transform: translate3d(42%, -18%, 0) scale(1.14, .86) rotate(4deg); }
      43% { transform: translate3d(91%, 8%, 0) scale(.82, 1.18) rotate(11deg); }
      68% { transform: translate3d(53%, 24%, 0) scale(1.2, .8) rotate(-2deg); }
      84% { transform: translate3d(8%, 13%, 0) scale(.96, 1.12) rotate(-10deg); }
    }
    @keyframes cta-blob-b {
      0%,100% { transform: translate3d(12%, 11%, 0) scale(1.05, .9) rotate(7deg); }
      27% { transform: translate3d(-38%, 24%, 0) scale(.84, 1.18) rotate(-5deg); }
      51% { transform: translate3d(-88%, -4%, 0) scale(1.16, .82) rotate(-12deg); }
      73% { transform: translate3d(-57%, -23%, 0) scale(.9, 1.12) rotate(2deg); }
      89% { transform: translate3d(-13%, -14%, 0) scale(1.12, .88) rotate(10deg); }
    }
    @keyframes cta-orbit { to { --cta-angle: 360deg; } }
    @keyframes sending-breathe {
      0%,100% { box-shadow: inset 0 1px 0 rgba(255,255,255,.16), 0 0 0 1px rgba(91,208,255,.16), 0 8px 24px rgba(45,171,239,.28); }
      50% { box-shadow: inset 0 1px 0 rgba(255,255,255,.22), 0 0 0 2px rgba(91,208,255,.34), 0 12px 34px rgba(45,171,239,.5); }
    }
    @keyframes sending-plane {
      0%,100% { transform: translate3d(-1px, 1px, 0) rotate(-2deg); }
      48% { transform: translate3d(3px, -2px, 0) rotate(3deg); }
    }

    @media (prefers-reduced-motion: reduce) {
      .btn-send, .btn-send::after, .btn-send .cta-blob, .btn-send .send-icon { animation: none !important; }
    }
    @media (max-width: 520px) { .btn-send { min-height: 50px; } }

    /* Success state: calm confirmation, with a clear route back to the form. */
    .thanks {
      position: relative; display: none; overflow: visible;
      text-align: center; padding: 24px 18px 20px;
      border-radius: 0;
      background: transparent;
    }
    .thanks.show { display: block; animation: success-rise .58s cubic-bezier(.16,.78,.24,1) both; }
    .success-mark {
      width: 70px; height: 70px; display: block; margin: 0 auto 17px;
      overflow: visible; color: #5ee2a6;
      filter: drop-shadow(0 8px 16px rgba(44, 204, 145, .2));
    }
    .success-mark-circle {
      fill: rgba(46, 203, 153, .055); stroke: rgba(105, 231, 190, .5); stroke-width: 1.6;
      stroke-dasharray: 190; stroke-dashoffset: 190;
    }
    .success-mark-check {
      fill: none; stroke: currentColor; stroke-width: 4.6;
      stroke-linecap: round; stroke-linejoin: round;
      stroke-dasharray: 54; stroke-dashoffset: 54;
    }
    .thanks.show .success-mark-circle { animation: success-draw .72s .12s cubic-bezier(.22,.72,.2,1) forwards; }
    .thanks.show .success-mark-check { animation: success-draw .48s .52s cubic-bezier(.2,.78,.22,1) forwards; }
    .thanks h1 {
      font-size: clamp(22px, 4vw, 27px); line-height: 1.1; letter-spacing: -.55px;
      margin-bottom: 9px; text-wrap: balance;
    }
    .thanks p {
      max-width: 470px; margin: 0 auto; color: var(--text-secondary);
      font-size: 14.5px; line-height: 1.55; text-wrap: pretty;
    }
    .success-actions {
      display: flex; align-items: center; justify-content: center; flex-wrap: wrap;
      gap: 10px 18px; margin-top: 22px;
    }
    .back-feedback {
      min-height: 42px; border: 1px solid rgba(101, 199, 255, .4); border-radius: 10px;
      padding: 0 16px; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      color: var(--text-primary); background: rgba(55, 148, 205, .11);
      font: inherit; font-size: 13.5px; font-weight: 700; cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
      transition: transform .2s cubic-bezier(.2,.8,.2,1), border-color .2s, background .2s;
    }
    .back-feedback svg { width: 16px; height: 16px; }
    .back-feedback:hover { transform: translateY(-1px); border-color: rgba(112, 211, 255, .72); background: rgba(55, 148, 205, .18); }
    .back-feedback:active { transform: translateY(0) scale(.985); }
    .back-feedback:focus-visible { outline: 3px solid var(--accent-glow); outline-offset: 3px; }
    .reinstall {
      color: var(--accent); text-decoration: none;
      font-size: 13.5px; font-weight: 650;
    }
    .reinstall:hover { text-decoration: underline; }
    .reinstall:focus-visible { outline: 3px solid var(--accent-glow); outline-offset: 4px; border-radius: 3px; }

    .confetti-layer {
      position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 20;
      perspective: 700px;
    }
    .confetti-piece {
      position: absolute; top: 0; left: 0; width: var(--w); height: var(--h);
      opacity: 0; transform: translate3d(-40px, -40px, 0);
      will-change: transform, opacity;
    }
    .confetti-face {
      display: block; width: 100%; height: 100%;
      border-radius: 2px; background: var(--color);
      box-shadow: 0 0 5px color-mix(in srgb, var(--color) 36%, transparent);
      animation: confetti-flutter var(--flutter) var(--flutter-delay) ease-in-out infinite alternate;
      will-change: transform;
    }
    .confetti-piece.is-circle .confetti-face { border-radius: 50%; }
    .confetti-piece.is-ribbon .confetti-face { border-radius: 99px; }
    .confetti-piece.is-star .confetti-face {
      clip-path: polygon(50% 0, 61% 34%, 98% 34%, 68% 55%, 79% 91%, 50% 70%, 21% 91%, 32% 55%, 2% 34%, 39% 34%);
    }
    @keyframes success-rise {
      from { opacity: 0; transform: translate3d(0, 14px, 0) scale(.985); }
      to { opacity: 1; transform: translate3d(0, 0, 0) scale(1); }
    }
    @keyframes success-card-sheen {
      0% { opacity: 0; transform: translate3d(-105%, 0, 0); }
      18% { opacity: 1; }
      100% { opacity: 0; transform: translate3d(105%, 0, 0); }
    }
    @keyframes success-draw { to { stroke-dashoffset: 0; } }
    @keyframes confetti-flutter {
      0% { transform: rotateX(-16deg) rotateY(0deg) skewX(-3deg); }
      50% { transform: rotateX(12deg) rotateY(82deg) skewX(4deg); }
      100% { transform: rotateX(-10deg) rotateY(168deg) skewX(-2deg); }
    }
    @media (prefers-reduced-motion: reduce) {
      .thanks.show, .card.success-mode::after, .thanks.show .success-mark-circle,
      .thanks.show .success-mark-check, .confetti-face,
      .confetti-replay.is-replaying svg { animation: none !important; }
      .success-mark-circle, .success-mark-check { stroke-dashoffset: 0; }
      .confetti-layer { display: none; }
    }

    /* contact block — one clear support action, with email kept deliberately secondary */
    .contact {
      position: relative;
      margin-top: 30px;
      padding-top: 24px;
      border-top: 0;
    }
    .contact::before {
      content: "";
      position: absolute;
      top: 0;
      inset-inline-start: 0;
      width: 100%;
      height: 1px;
      opacity: .90;
      background: linear-gradient(90deg,
        rgba(112, 197, 255, .40) 0%,
        rgba(112, 197, 255, .76) 26%,
        rgba(190, 164, 255, .66) 50%,
        rgba(112, 197, 255, .72) 74%,
        rgba(112, 197, 255, .40) 100%);
      background-size: 220% 100%;
      box-shadow: 0 0 8px rgba(112, 197, 255, .24);
      animation: contact-divider-flow 9s ease-in-out infinite alternate;
      pointer-events: none;
    }
    @keyframes contact-divider-flow {
      from { background-position: 0% 50%; }
      to { background-position: 100% 50%; }
    }
    .contact h2 {
      font-size: 15.5px;
      font-weight: 700;
      letter-spacing: -.2px;
      margin-bottom: 4px;
    }
    .contact .lead {
      max-width: 46ch;
      color: var(--text-secondary);
      font-size: 13.5px;
      line-height: 1.45;
      margin: 0 0 14px;
      text-wrap: pretty;
    }
    .contact-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 10px;
    }
    .contact-link {
      position: relative;
      display: flex;
      align-items: center;
      gap: 11px;
      min-width: 0;
      min-height: 64px;
      text-decoration: none;
      color: var(--text-primary);
      padding: 10px 14px;
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      background: var(--input-bg);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .06);
      transition: color .2s, border-color .2s, background .2s, box-shadow .2s;
      cursor: pointer;
    }
    .contact-link:focus-visible { outline: 3px solid var(--accent-glow); outline-offset: 3px; }
    .contact-link--telegram {
      color: #fff;
      border: 1px solid rgba(96, 190, 247, .44);
      background: linear-gradient(105deg, rgba(17, 92, 137, .56), rgba(5, 38, 67, .66));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, .10),
        0 8px 22px rgba(7, 54, 88, .16);
    }
    .contact-link--telegram:hover {
      border-color: rgba(125, 213, 255, .70);
      background: linear-gradient(105deg, rgba(20, 105, 155, .64), rgba(6, 45, 76, .72));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, .13),
        0 10px 25px rgba(23, 125, 187, .18);
    }
    .contact-link--telegram:active { box-shadow: inset 0 2px 6px rgba(1, 18, 33, .22); }
    .contact-link--email {
      justify-self: stretch;
      color: var(--text-primary);
    }
    .contact-link--email:hover {
      border-color: var(--glass-border);
      background: var(--glass-bg-hover);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .09), 0 8px 20px rgba(7, 28, 52, .12);
    }
    .contact-link--email:active { box-shadow: inset 0 2px 6px rgba(1, 18, 33, .12); }
    .contact-link .ico {
      width: 40px; height: 40px; flex: none;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      background: var(--accent-glow);
      color: var(--accent);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .10);
    }
    .contact-link--telegram .ico {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      color: #fff;
      background: #229ed9;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, .28),
        0 5px 14px rgba(17, 139, 203, .26);
    }
    .contact-link--telegram .ico svg {
      width: 21px;
      height: 21px;
      transform: translate(-1px, 1px);
    }
    .contact-link .txt { display: flex; flex-direction: column; line-height: 1.25; min-width: 0; }
    .contact-link .txt b { font-size: 14.5px; font-weight: 650; }
    .contact-link--telegram .txt b { font-size: 14.5px; color: #fff; }
    .contact-link .txt small { font-size: 11.5px; color: var(--text-muted); line-height: 1.35; }
    .contact-link--telegram .txt small { color: rgba(255, 255, 255, .68); }
    .contact-link--email .contact-address { color: var(--text-secondary); overflow-wrap: anywhere; }
    .contact-link .arrow {
      margin-inline-start: auto;
      width: 29px;
      height: 29px;
      flex: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      color: rgba(255, 255, 255, .82);
      background: rgba(255, 255, 255, .10);
      border: 1px solid rgba(255, 255, 255, .13);
      transition: transform .2s cubic-bezier(.2,.8,.2,1), background .2s;
    }
    .contact-link--telegram:hover .arrow { transform: translateX(2px); background: rgba(255, 255, 255, .17); }
    .contact-link--email .arrow {
      color: var(--accent);
      background: var(--accent-glow);
      border-color: rgba(96, 184, 255, .18);
    }
    .contact-link--email:hover .arrow { transform: translateX(2px); background: rgba(96, 184, 255, .18); }
    html[dir="rtl"] .contact-link .arrow svg { transform: rotate(180deg); }
    html[dir="rtl"] .contact-link--telegram:hover .arrow { transform: translateX(-2px); }
    html[dir="rtl"] .contact-link--email:hover .arrow { transform: translateX(-2px); }

    @media (prefers-reduced-motion: reduce) {
      .contact-link, .contact-link .arrow { transition: none; }
      .contact::before { animation: none; background-position: 50% 50%; }
      .lang-menu { animation: none; }
      .lang-chevron { transition: none; }
    }

    .privacy-note {
      margin: 16px auto 0;
      max-width: 48ch;
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.5;
    }
    .privacy-note a { color: var(--text-secondary); text-underline-offset: 2px; }
    .privacy-note a:hover { color: var(--text-primary); }

    body.light .contact-link--telegram {
      color: #fff;
      border-color: rgba(17, 135, 198, .38);
      background: linear-gradient(105deg, #167eb7, #075985);
    }
    body.light .contact-link--telegram:hover {
      border-color: rgba(5, 101, 153, .65);
      background: linear-gradient(105deg, #1788c4, #07527b);
    }
    body.light .contact-link--email:hover { background: rgba(255, 255, 255, .62); }
    body.light .contact::before {
      opacity: .65;
      background: linear-gradient(90deg,
        rgba(10, 111, 219, .28) 0%,
        rgba(10, 111, 219, .56) 28%,
        rgba(126, 87, 194, .44) 50%,
        rgba(10, 111, 219, .52) 72%,
        rgba(10, 111, 219, .28) 100%);
      background-size: 220% 100%;
    }

    .toast {
      position: fixed;
      bottom: 22px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--ok); color: #04121f;
      font-size: 13px; font-weight: 600;
      padding: 9px 16px; border-radius: 999px;
      opacity: 0; pointer-events: none;
      transition: opacity .2s, transform .2s;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 480px) {
      .card { padding: 24px 18px; }
      h1 { font-size: 21px; }
      .subreason-options { grid-template-columns: 1fr; }
      .contact { padding-top: 22px; }
    }
  </style>
</head>

      const strongText = I18N[lang] && I18N[lang].subtitleStrong;
      if (strongText && text.includes(strongText)) {
        const splitAt = text.indexOf(strongText);
        el.textContent = text.slice(0, splitAt);
        const strong = document.createElement("strong");
        strong.textContent = strongText;
        el.append(strong, document.createTextNode(text.slice(splitAt + strongText.length)));
        return;
      }
      const separators = [" — ", "——", ", y "];
      const separator = separators.find(value => text.includes(value));
      if (!separator) { el.textContent = text; return; }
      const splitAt = text.indexOf(separator);
      el.textContent = text.slice(0, splitAt + separator.length);
      const strong = document.createElement("strong");
      strong.textContent = text.slice(splitAt + separator.length);
      el.appendChild(strong);
    }

    // Keep the question visible while the placeholder provides a concrete example.
    function refreshDetailField() {
      const detailEl = document.getElementById("detail");
      if (!detailEl) return;
      document.getElementById("detailQuestion").textContent =
        (selectedReason && t("ph_" + selectedReason)) || t("detailPrompt");
      const localStrings = I18N[lang] || {};
      const exampleKey = selectedReason && "ex_" + selectedReason;
      detailEl.placeholder = (exampleKey && localStrings[exampleKey])
        || localStrings.detailExample
        || localStrings.detailPrompt
        || t("detailExample");
      renderContactConsent(document.getElementById("contactConsent"), t("phContact"));
    }

    function renderContactConsent(el, text) {
      if (!el) return;
      el.textContent = "";
      const match = text.match(/^(.+?[?？؟])\s*(.*)$/);
      if (!match) { el.textContent = text; return; }
      const strong = document.createElement("strong");
      strong.textContent = match[1];
      el.append(strong, document.createTextNode(match[2] ? " " + match[2] : ""));
    }

    /* ---------------- theme ---------------- */
    (function initTheme() {
      let theme;
      try { theme = localStorage.getItem("xporter_theme"); } catch (e) {}
      if (theme !== "light" && theme !== "dark") theme = params.theme;       // extension may pass ?theme=
      if (theme !== "light" && theme !== "dark") {
        // Light is the baseline; go dark only if the browser/OS explicitly prefers dark.
        theme = (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
      }
      if (theme === "light") document.body.classList.add("light");
    })();
    document.getElementById("themeToggle").addEventListener("click", function () {
      const isLight = document.body.classList.toggle("light");
      try { localStorage.setItem("xporter_theme", isLight ? "light" : "dark"); } catch (e) {}
    });

    /* ---------------- build UI ---------------- */
    // Custom language switcher, matching the extension without the native select menu.
    const LANG_ORDER = ["en", "zh_CN", "ja", "es", "ko", "ru", "it", "pt_BR", "tr", "de", "ar", "fr", "hi", "id"];
    const langSelector = document.getElementById("langSelector");
    const langBtn = document.getElementById("langBtn");
    const langMenu = document.getElementById("langMenu");
    const langCurrentFlag = document.getElementById("langCurrentFlag");
    const langCurrentName = document.getElementById("langCurrentName");

    function updateLangButton() {
      langCurrentFlag.textContent = LANG_FLAGS[lang] || "🌐";
      langCurrentName.textContent = LANG_NAMES[lang] || lang;
    }

    function renderLangMenu() {
      langMenu.textContent = "";
      LANG_ORDER.filter(code => I18N[code]).forEach(code => {
        const option = document.createElement("button");
        option.type = "button";
        option.className = "lang-option";
        option.dataset.lang = code;
        option.setAttribute("role", "option");
        option.setAttribute("aria-selected", String(code === lang));

        const flag = document.createElement("span");
        flag.className = "lang-option-flag";
        flag.setAttribute("aria-hidden", "true");
        flag.textContent = LANG_FLAGS[code] || "🌐";

        const name = document.createElement("span");
        name.className = "lang-option-name";
        name.textContent = LANG_NAMES[code] || code;

        const check = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        check.setAttribute("class", "lang-option-check");
        check.setAttribute("width", "15");
        check.setAttribute("height", "15");
        check.setAttribute("viewBox", "0 0 24 24");
        check.setAttribute("fill", "none");
        check.setAttribute("stroke", "currentColor");
        check.setAttribute("stroke-width", "2.5");
        check.setAttribute("stroke-linecap", "round");
        check.setAttribute("stroke-linejoin", "round");
        check.setAttribute("aria-hidden", "true");
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", "m5 12 5 5L20 7");
        check.appendChild(path);

        option.append(flag, name, check);
        option.addEventListener("click", () => selectLanguage(code));
        langMenu.appendChild(option);
      });
    }

    function setLangMenuOpen(open, returnFocus = false) {
      langMenu.hidden = !open;
      langBtn.setAttribute("aria-expanded", String(open));
      if (open) {
        requestAnimationFrame(() => {
          const active = langMenu.querySelector('[aria-selected="true"]');
          if (active) {
            active.focus({ preventScroll: true });
            active.scrollIntoView({ block: "nearest" });
          }
        });
      } else if (returnFocus) {
        langBtn.focus();
      }
    }

    function selectLanguage(code) {
      if (!I18N[code]) return;
      lang = code;
      applyI18n();
      renderReasons();
      updateLangButton();
      renderLangMenu();
      setLangMenuOpen(false, true);
    }

    function moveLangFocus(direction) {
      const options = Array.from(langMenu.querySelectorAll(".lang-option"));
      if (!options.length) return;
      const current = options.indexOf(document.activeElement);
      const next = current < 0 ? 0 : (current + direction + options.length) % options.length;
      options[next].focus();
      options[next].scrollIntoView({ block: "nearest" });
    }

    langBtn.addEventListener("click", event => {
      event.stopPropagation();
      setLangMenuOpen(langBtn.getAttribute("aria-expanded") !== "true");
    });
    langBtn.addEventListener("keydown", event => {
      if (event.key !== "ArrowDown" && event.key !== "ArrowUp") return;
      event.preventDefault();
      setLangMenuOpen(true);
      requestAnimationFrame(() => moveLangFocus(event.key === "ArrowDown" ? 1 : -1));
    });
    langMenu.addEventListener("keydown", event => {
      if (event.key === "ArrowDown" || event.key === "ArrowUp") {
        event.preventDefault();
        moveLangFocus(event.key === "ArrowDown" ? 1 : -1);
      } else if (event.key === "Home" || event.key === "End") {
        event.preventDefault();
        const options = langMenu.querySelectorAll(".lang-option");
        const target = event.key === "Home" ? options[0] : options[options.length - 1];
        if (target) target.focus();
      } else if (event.key === "Escape") {
        event.preventDefault();
        setLangMenuOpen(false, true);
      }
    });
    document.addEventListener("click", event => {
      if (!langMenu.hidden && !langSelector.contains(event.target)) setLangMenuOpen(false);
    });

    updateLangButton();
    renderLangMenu();

    // reason chips
    const reasonsEl = document.getElementById("reasons");
    const actionEl = document.getElementById("action"); // persistent ref (survives re-render)
    const subreasonBlockEl = document.getElementById("subreasonBlock");
    const subreasonOptionsEl = document.getElementById("subreasonOptions");
    function renderReasons() {
      reasonsEl.innerHTML = "";
      REASON_KEYS.forEach((key) => {
        const b = document.createElement("button");
        b.className = "reason";
        b.dataset.reason = key;
        if (key === selectedReason) b.classList.add("selected");
        b.innerHTML = `<span class="reason-icon" aria-hidden="true"></span><span>${t(key)}</span>`
          + `<span class="check" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>`;
        b.addEventListener("click", () => onReason(key));
        reasonsEl.appendChild(b);
      });
      // Slide the comment+send panel in right under the selected reason
      // (re-attached here so it survives re-renders, e.g. language switch).
      if (selectedReason && actionEl.classList.contains("show")) {
        const selBtn = reasonsEl.querySelector(".reason.selected");
        if (selBtn) selBtn.insertAdjacentElement("afterend", actionEl);
      }
    }

    function renderSubreasons() {
      if (!subreasonBlockEl || !subreasonOptionsEl) return;
      const options = SUBREASON_OPTIONS[selectedReason] || [];
      subreasonBlockEl.hidden = !options.length;
      document.getElementById("subreasonPrompt").textContent = t("subreasonPrompt");
      subreasonOptionsEl.innerHTML = "";
      options.forEach(function (key) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "subreason";
        button.dataset.subreason = key;
        button.dataset.group = selectedReason;
        button.setAttribute("aria-pressed", selectedSubreasons.has(key) ? "true" : "false");
        button.innerHTML = '<span class="subreason-icon" aria-hidden="true">'
          + miniIcon(SUBREASON_ICONS[key])
          + '</span><span class="subreason-label"></span>'
          + '<span class="subreason-check" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>';
        button.querySelector(".subreason-label").textContent = t(key);
        button.addEventListener("click", function () {
          if (selectedSubreasons.has(key)) selectedSubreasons.delete(key);
          else selectedSubreasons.add(key);
          button.setAttribute("aria-pressed", selectedSubreasons.has(key) ? "true" : "false");
          // Persist chips immediately. Omitting `type` keeps the last meaningful
          // event (reason/detail) intact while the Sheet stats are updated.
          send(basePayload());
        });
        subreasonOptionsEl.appendChild(button);
      });
    }

    // contact links
    document.getElementById("tgLink").href = TELEGRAM_URL;
    document.getElementById("emailLink").href = "mailto:" + EMAIL + "?subject=" + encodeURIComponent("XPorter feedback");
    document.getElementById("emailAddress").textContent = EMAIL;
    document.getElementById("reinstallLink").href = STORE_URL;

    /* ---------------- state + sending ---------------- */
    const sessionId = (crypto.randomUUID ? crypto.randomUUID() : String(Math.random()).slice(2) + Date.now());
    let selectedReason = null;
    let selectedSubreasons = new Set();
    const selectedSubreasonsByReason = new Map();
    const reasonHistory = [];
    let reasonSent = false;
    let reasonTransitioning = false;
    let queuedReason = null;
    const reduceReasonMotion = window.matchMedia
      && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    // How long this feedback page is actively VISIBLE — tells "read it and
    // answered" from "bounced instantly". Anonymous; counts visible time only.
    let pageActiveMs = 0;
    let lastVisibleAt = (document.visibilityState === "visible") ? Date.now() : 0;
    function pageSeconds() {
      let total = pageActiveMs;
      if (lastVisibleAt) total += Date.now() - lastVisibleAt;
      return Math.round(total / 1000);
    }

    function basePayload() {
      const subreasonKeys = Array.from(selectedSubreasons);
      const selectedGroups = REASON_KEYS.map(function (reason) {
        return [reason, Array.from(selectedSubreasonsByReason.get(reason) || [])];
      }).filter(function (entry) { return entry[1].length; });
      const allSubreasonKeys = selectedGroups.flatMap(function (entry) { return entry[1]; });
      return {
        sessionId,
        source: params.src || (Object.keys(params).length ? "uninstall" : "direct"),
        pageLang: lang,
        // forward every stat the extension appended to the URL, plus the live
        // dwell time on this page:
        stats: Object.assign({}, params, {
          page_s: pageSeconds(),
          subreasons: subreasonKeys.length ? subreasonKeys.join(" | ") : "none",
          subreason_labels: subreasonKeys.length
            ? subreasonKeys.map(key => I18N.en[key] || key).join(" | ")
            : "none",
          // Keep the final reason easy to analyse in the existing columns, but
          // also retain every chip selected under earlier reasons.
          reason_history: reasonHistory.length ? reasonHistory.join(" | ") : "none",
          subreasons_all: allSubreasonKeys.length ? allSubreasonKeys.join(" | ") : "none",
          subreason_labels_all: selectedGroups.length
            ? selectedGroups.map(function (entry) {
                return (I18N.en[entry[0]] || entry[0]) + ": "
                  + entry[1].map(key => I18N.en[key] || key).join("; ");
              }).join(" || ")
            : "none"
        }),
        ts: new Date().toISOString()
      };
    }

    document.addEventListener("visibilitychange", function () {
      if (document.visibilityState === "visible") {
        lastVisibleAt = Date.now();
      } else if (lastVisibleAt) {
        pageActiveMs += Date.now() - lastVisibleAt;
        lastVisibleAt = 0;
        // Push the updated dwell time. No `type` → the upsert won't clobber an
        // already-chosen reason / lastType, it just refreshes page_s.
        send(basePayload());
      }
    });
    window.addEventListener("pagehide", function () { send(basePayload()); });

    function send(payload) {
      if (params.preview === "1") {
        console.info("[XPorter feedback preview] Payload not sent:", payload);
        return Promise.resolve(true);
      }
      if (!ENDPOINT || ENDPOINT.startsWith("PASTE_")) {
        console.warn("[XPorter feedback] ENDPOINT not configured. Payload:", payload);
        return Promise.resolve(false);
      }
      // Apps Script doesn't return CORS headers, so a normal cors-mode fetch
      // would reject even though the POST succeeds server-side. Use no-cors:
      // the request is still sent (and the row written); the response is opaque
      // and we don't need to read it. text/plain keeps it a simple request.
      return fetch(ENDPOINT, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload),
        keepalive: true
      }).then(() => true).catch(() => false);
    }

    const actionCollapsedFrame = {
      height: "0px",
      marginTop: "0px",
      marginBottom: "0px",
      opacity: 0
    };

    // A hand-shaped motion graph: brief take-off, an early speed peak, then a
    // long cubic tail whose velocity joins smoothly and reaches true zero.
    // First-open and reason-to-reason movement use the same profile.
    const ACTION_MOTION_DURATION = 700;
    const ACTION_MOTION_TAIL_EASING = "cubic-bezier(.12, .68, .24, 1)";
    const ACTION_MOTION_STOPS = [
      [0, 0],
      [.031, .01],
      [.085, .26],
      [.154, .58],
      [.247, .79],
      [.370, .90],
      [1, 1]
    ];

    function actionExpandedFrame(height, marginBottom) {
      return {
        height: height + "px",
        marginTop: "6px",
        marginBottom: marginBottom + "px",
        opacity: 1
      };
    }

    function actionMotionKeyframes(height, marginBottom, opening) {
      return ACTION_MOTION_STOPS.map(([offset, progress]) => {
        const amount = opening ? progress : 1 - progress;
        return {
          offset,
          easing: progress === .90 ? ACTION_MOTION_TAIL_EASING : "linear",
          height: (height * amount) + "px",
          marginTop: (6 * amount) + "px",
          marginBottom: (marginBottom * amount) + "px",
          // Let geometry carry the long tail; reach visual opacity earlier so
          // the ending remains visible instead of merely fading away.
          opacity: Math.min(1, amount * 1.7)
        };
      });
    }

    function naturalActionHeight() {
      const previousHeight = actionEl.style.height;
      actionEl.style.height = "auto";
      const height = actionEl.getBoundingClientRect().height;
      actionEl.style.height = previousHeight;
      return height;
    }

    function naturalActionBottomMargin(element) {
      return parseFloat(getComputedStyle(element).marginBottom) || 0;
    }

    function clearActionMotionStyles(element) {
      element.classList.remove("is-transitioning");
      ["height", "marginTop", "marginBottom", "opacity", "overflow"]
        .forEach(property => { element.style[property] = ""; });
    }

    function makeActionGhost() {
      const oldHeight = actionEl.getBoundingClientRect().height;
      const oldMarginBottom = parseFloat(getComputedStyle(actionEl).marginBottom) || 0;
      const ghost = actionEl.cloneNode(true);
      ghost.removeAttribute("id");
      ghost.className = "action show action-transition-ghost is-transitioning";
      ghost.setAttribute("aria-hidden", "true");
      ghost.setAttribute("inert", "");
      ghost.querySelectorAll("[id]").forEach(element => element.removeAttribute("id"));
      ghost.querySelectorAll("[for]").forEach(element => element.removeAttribute("for"));
      const liveTextareas = actionEl.querySelectorAll("textarea");
      ghost.querySelectorAll("textarea").forEach((element, index) => {
        if (liveTextareas[index]) element.value = liveTextareas[index].value;
      });
      Object.assign(ghost.style, actionExpandedFrame(oldHeight, oldMarginBottom));
      actionEl.insertAdjacentElement("beforebegin", ghost);
      return { ghost, oldHeight, oldMarginBottom };
    }

    async function animateFirstActionOpen() {
      actionEl.classList.add("show", "is-transitioning");
      const targetHeight = naturalActionHeight();
      const targetMarginBottom = naturalActionBottomMargin(actionEl);
      if (reduceReasonMotion || typeof actionEl.animate !== "function") {
        clearActionMotionStyles(actionEl);
        return;
      }
      Object.assign(actionEl.style, actionCollapsedFrame);
      const animation = actionEl.animate(
        actionMotionKeyframes(targetHeight, targetMarginBottom, true),
        { duration: ACTION_MOTION_DURATION, easing: "linear", fill: "forwards" }
      );
      try { await animation.finished; } catch (error) {}
      Object.assign(actionEl.style, actionExpandedFrame(targetHeight, targetMarginBottom));
      animation.cancel();
      clearActionMotionStyles(actionEl);
    }

    async function animateActionTransfer(ghost, oldHeight, oldMarginBottom) {
      actionEl.classList.add("show", "is-transitioning");
      const newHeight = naturalActionHeight();
      const newMarginBottom = naturalActionBottomMargin(actionEl);
      if (reduceReasonMotion || typeof actionEl.animate !== "function") {
        if (ghost && ghost.isConnected) ghost.remove();
        clearActionMotionStyles(actionEl);
        return;
      }

      const oldExpanded = actionExpandedFrame(oldHeight, oldMarginBottom);
      const newExpanded = actionExpandedFrame(newHeight, newMarginBottom);
      Object.assign(ghost.style, oldExpanded);
      Object.assign(actionEl.style, actionCollapsedFrame);
      // Commit both complementary starting sizes before advancing their shared timeline.
      void actionEl.offsetHeight;
      const options = {
        duration: ACTION_MOTION_DURATION,
        easing: "linear",
        fill: "forwards"
      };
      const closeAnimation = ghost.animate(
        actionMotionKeyframes(oldHeight, oldMarginBottom, false),
        options
      );
      const openAnimation = actionEl.animate(
        actionMotionKeyframes(newHeight, newMarginBottom, true),
        options
      );
      try { await Promise.all([closeAnimation.finished, openAnimation.finished]); } catch (error) {}
      Object.assign(ghost.style, actionCollapsedFrame);
      Object.assign(actionEl.style, newExpanded);
      closeAnimation.cancel();
      openAnimation.cancel();
      if (ghost.isConnected) ghost.remove();
      clearActionMotionStyles(actionEl);
    }

    async function onReason(key) {
      // Re-clicking the current reason is intentionally a no-op: keep the
      // form, its values and its visual state exactly as they are.
      if (key === selectedReason) {
        if (reasonTransitioning) queuedReason = null;
        return;
      }
      if (reasonTransitioning) {
        queuedReason = key;
        return;
      }

      const hadOpenPanel = selectedReason && actionEl.classList.contains("show");
      const transfer = hadOpenPanel ? makeActionGhost() : null;
      reasonTransitioning = true;

      selectedReason = key;
      if (!selectedSubreasonsByReason.has(key)) selectedSubreasonsByReason.set(key, new Set());
      selectedSubreasons = selectedSubreasonsByReason.get(key);
      if (!reasonHistory.includes(key)) reasonHistory.push(key);
      // Update selection on the existing chips (no full re-render → the chips
      // smoothly transition in/out of the selected state, no flash).
      reasonsEl.querySelectorAll(".reason").forEach(function (b) {
        b.classList.toggle("selected", b.dataset.reason === key);
      });
      const selBtn = reasonsEl.querySelector(".reason.selected");
      actionEl.classList.add("show", "is-transitioning");
      Object.assign(actionEl.style, actionCollapsedFrame);
      renderSubreasons();
      refreshDetailField();
      if (selBtn) selBtn.insertAdjacentElement("afterend", actionEl);
      // Don't auto-focus the textarea — most people just pick a reason and
      // shouldn't get a keyboard popup on mobile.
      // Save the reason immediately (so we keep it even if they bounce / never hit Send).
      if (!reasonSent) {
        reasonSent = true;
        send(Object.assign(basePayload(), { type: "reason", reason: key }));
      } else {
        send(Object.assign(basePayload(), { type: "reason_update", reason: key }));
      }
      if (transfer) {
        await animateActionTransfer(transfer.ghost, transfer.oldHeight, transfer.oldMarginBottom);
      }
      else await animateFirstActionOpen();
      reasonTransitioning = false;
      actionEl.scrollIntoView({ behavior: "smooth", block: "nearest" });
      const next = queuedReason;
      queuedReason = null;
      if (next && next !== selectedReason) onReason(next);
    }

    let confettiTimer;
    function launchConfetti() {
      if (reduceReasonMotion) return;
      const layer = document.getElementById("confettiLayer");
      if (!layer) return;
      clearTimeout(confettiTimer);
      layer.replaceChildren();
      const colors = ["#42c8ff", "#85e9ff", "#a98cff", "#d99bff", "#ffd15c", "#55e5a7", "#ff7187"];
      const fragment = document.createDocumentFragment();
      const particles = [];
      const viewportWidth = window.innerWidth;
      const viewportHeight = window.innerHeight;
      const cardRect = document.querySelector(".card").getBoundingClientRect();
      const originY = Math.min(230, Math.max(128, viewportHeight * .24));
      const leftOrigin = Math.max(42, cardRect.left + cardRect.width * .24);
      const rightOrigin = Math.min(viewportWidth - 42, cardRect.right - cardRect.width * .24);

      function createPiece(index, type) {
        const piece = document.createElement("i");
        const face = document.createElement("span");
        const shapeRoll = Math.random();
        const width = shapeRoll > .88 ? 9 + Math.random() * 4 : 5 + Math.random() * 6;
        const height = shapeRoll < .18 ? width * (1.7 + Math.random() * .7) : width * (.58 + Math.random() * .9);
        piece.className = "confetti-piece";
        if (shapeRoll < .18) piece.classList.add("is-ribbon");
        else if (shapeRoll > .88) piece.classList.add("is-star");
        else if (shapeRoll > .68) piece.classList.add("is-circle");
        face.className = "confetti-face";
        piece.style.setProperty("--w", width.toFixed(1) + "px");
        piece.style.setProperty("--h", height.toFixed(1) + "px");
        piece.style.setProperty("--color", colors[index % colors.length]);
        piece.style.setProperty("--flutter", (360 + Math.random() * 300).toFixed(0) + "ms");
        piece.style.setProperty("--flutter-delay", (-Math.random() * 520).toFixed(0) + "ms");
        piece.appendChild(face);
        fragment.appendChild(piece);
        particles.push({ piece: piece, type: type, index: index });
      }

      // Two restrained cannons give the celebration a clear focal point;
      // a smaller top shower keeps the full-page fullness of the old effect.
      for (let index = 0; index < 46; index += 1) createPiece(index, index % 2 ? "right" : "left");
      for (let index = 46; index < 60; index += 1) createPiece(index, "shower");
      layer.appendChild(fragment);

      particles.forEach(function (particle) {
        const piece = particle.piece;
        const spinDirection = Math.random() > .5 ? 1 : -1;
        const spin = spinDirection * (620 + Math.random() * 940);
        let duration;
        let delay;
        let keyframes;

        function sampleTrajectory(positionAt, rotationAt, scaleAt) {
          const frames = [];
          const steps = 30;
          for (let step = 0; step <= steps; step += 1) {
            const progress = step / steps;
            const position = positionAt(progress);
            const fadeIn = Math.min(1, progress / .055);
            const fadeOut = Math.min(1, Math.max(0, (1 - progress) / .12));
            frames.push({
              offset: progress,
              opacity: Math.min(fadeIn, fadeOut) * .98,
              transform: `translate3d(${position.x}px,${position.y}px,0) rotate(${rotationAt(progress)}deg) scale(${scaleAt(progress)})`
            });
          }
          return frames;
        }

        if (particle.type === "shower") {
          const startX = viewportWidth * (.03 + Math.random() * .94);
          const drift = (Math.random() - .5) * 180;
          const sway = (Math.random() - .5) * 84;
          duration = 2500 + Math.random() * 900;
          delay = 90 + Math.random() * 260;
          const seconds = duration / 1000;
          const startY = -28;
          const endY = viewportHeight + 52;
          const initialVelocity = 86 + Math.random() * 64;
          const gravity = 2 * (endY - startY - initialVelocity * seconds) / (seconds * seconds);
          const swayPhase = Math.random() * Math.PI * 2;
          keyframes = sampleTrajectory(function (progress) {
            const time = progress * seconds;
            return {
              x: startX + drift * progress + Math.sin(progress * Math.PI * 2 + swayPhase) * sway * Math.sin(progress * Math.PI),
              y: startY + initialVelocity * time + .5 * gravity * time * time
            };
          }, function (progress) {
            return spin * progress;
          }, function (progress) {
            return (.72 + Math.min(progress / .09, 1) * .28 - Math.max(0, progress - .82) * .44).toFixed(3);
          });
        } else {
          const fromLeft = particle.type === "left";
          const startX = fromLeft ? leftOrigin : rightOrigin;
          const direction = fromLeft ? 1 : -1;
          const travel = direction * (150 + Math.random() * Math.min(330, viewportWidth * .30));
          const startRotation = (Math.random() - .5) * 50;
          duration = 2200 + Math.random() * 820;
          delay = Math.random() * 150;
          const seconds = duration / 1000;
          const endY = viewportHeight + 58;
          const initialVelocity = -(430 + Math.random() * 170);
          const gravity = 2 * (endY - originY - initialVelocity * seconds) / (seconds * seconds);
          const drag = 2.15 + Math.random() * .7;
          const dragRange = 1 - Math.exp(-drag);
          keyframes = sampleTrajectory(function (progress) {
            const time = progress * seconds;
            const horizontalProgress = (1 - Math.exp(-drag * progress)) / dragRange;
            return {
              x: startX + travel * horizontalProgress,
              y: originY + initialVelocity * time + .5 * gravity * time * time
            };
          }, function (progress) {
            return startRotation + spin * progress;
          }, function (progress) {
            return (.55 + Math.min(progress / .07, 1) * .45 - Math.max(0, progress - .78) * .5).toFixed(3);
          });
        }

        piece.animate(keyframes, {
          duration: duration,
          delay: delay,
          fill: "forwards",
          easing: "linear"
        });
      });
      confettiTimer = setTimeout(function () { layer.replaceChildren(); }, 3900);
    }

    function finish() {
      document.querySelector(".card").classList.add("success-mode");
      document.getElementById("form").style.display = "none";
      document.getElementById("thanks").classList.add("show");
      document.getElementById("confettiReplay").hidden = !!reduceReasonMotion;
      window.scrollTo({ top: 0, behavior: "smooth" });
      launchConfetti();
    }

    function returnToFeedback() {
      const form = document.getElementById("form");
      const thanks = document.getElementById("thanks");
      const btn = document.getElementById("submitBtn");
      const label = btn.querySelector("[data-i18n='submit']");
      document.querySelector(".card").classList.remove("success-mode");
      document.getElementById("confettiReplay").hidden = true;
      thanks.classList.remove("show");
      form.style.display = "";
      btn.disabled = false;
      btn.classList.remove("is-sending");
      if (label) label.textContent = t("submit");
      requestAnimationFrame(function () {
        (selectedReason ? actionEl : form).scrollIntoView({ behavior: "smooth", block: "center" });
      });
    }

    function composeDetail(manualDetail) {
      const groups = REASON_KEYS.map(function (reason) {
        const keys = Array.from(selectedSubreasonsByReason.get(reason) || []);
        if (!keys.length) return "";
        return "- " + (I18N.en[reason] || reason) + ": "
          + keys.map(key => I18N.en[key] || key).join("; ");
      }).filter(Boolean);
      const selectedDetails = groups.length ? "Selected details:\n" + groups.join("\n") : "";
      return [selectedDetails, manualDetail].filter(Boolean).join("\n\n");
    }

    document.getElementById("submitBtn").addEventListener("click", async () => {
      const btn = document.getElementById("submitBtn");
      const label = btn.querySelector("[data-i18n='submit']");
      const detail = composeDetail(document.getElementById("detail").value.trim());
      btn.disabled = true;
      btn.classList.add("is-sending");
      if (label) label.textContent = t("sending");
      const delivery = send(Object.assign(basePayload(), { type: "detail", reason: selectedReason, detail }));
      const minimumWait = new Promise(resolve => setTimeout(resolve, 720));
      const result = await Promise.race([
        delivery.then(ok => ({ settled: true, ok })),
        new Promise(resolve => setTimeout(() => resolve({ settled: false, ok: true }), 1200))
      ]);
      await minimumWait;
      if (result.settled && !result.ok && !(ENDPOINT.startsWith("PASTE_"))) {
        btn.disabled = false;
        btn.classList.remove("is-sending");
        if (label) label.textContent = t("submit");
        showToast(t("errorMsg"));
        return;
      }
      finish();
      if (!result.settled) {
        delivery.then(function (ok) {
          if (!ok) console.warn("[XPorter feedback] The background detail request did not finish.");
        });
      }
    });
    document.getElementById("backToFeedback").addEventListener("click", returnToFeedback);
    document.getElementById("confettiReplay").addEventListener("click", function () {
      const replayButton = this;
      replayButton.classList.remove("is-replaying");
      requestAnimationFrame(function () {
        replayButton.classList.add("is-replaying");
        launchConfetti();
        setTimeout(function () { replayButton.classList.remove("is-replaying"); }, 560);
      });
    });

    /* email copy on click */
    document.getElementById("emailLink").addEventListener("click", (e) => {
      // let mailto work, but also copy for convenience
      if (navigator.clipboard) navigator.clipboard.writeText(EMAIL).then(() => showToast(EMAIL)).catch(() => {});
    });

    const toastEl = document.getElementById("toast");
    let toastTimer;
    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove("show"), 2200);
    }

    /* ---------------- init ---------------- */
    applyI18n();
    renderReasons();

    // Auto-capture the anonymous usage snapshot on load, so churn is recorded
    // even if the visitor closes the tab without picking a reason. Reason/detail
    // (if given) enrich this same row later via the sessionId upsert.
    send(Object.assign(basePayload(), { type: "open" }));
  </script>
</body>

</html>
